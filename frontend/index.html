<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- កែប្រែ Viewport ដើម្បីបិទ Zoom និងកំណត់ទំហំឱ្យត្រូវស្តង់ដារ Mini App -->
    <meta 
      name="viewport" 
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" 
    />

    <!-- Telegram Web App SDK (ចាំបាច់សម្រាប់គ្រប់គ្រង Header Color និង Expand) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Kantumruy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Thida Shop</title>

    <style>
      /* បិទ Gesture Zoom លើ iOS/Android និងបិទ Text Auto-size */
      html, body {
        touch-action: pan-x pan-y;
        -webkit-text-size-adjust: 100%;
        margin: 0;
        padding: 0;
      }

      /* ការពារកុំឱ្យ iOS Zoom ពេលចុចលើប្រអប់ Search/Input (កំណត់ Font 16px ជាស្តង់ដារ) */
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
