services:
  - type: web
    name: fashionhub-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fashionhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 1d
      - key: DEVICE_API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # set manually to your Vercel frontend URL after first deploy
      - key: PORT
        value: 5000

databases:
  - name: fashionhub-db
    plan: free
    databaseName: fashionhub
    user: fashionhub
